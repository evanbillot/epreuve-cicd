apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskapi
  template:
    metadata:
      labels:
        app: taskapi
    spec:
      containers:
        - name: taskapi
          image: taskapi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5